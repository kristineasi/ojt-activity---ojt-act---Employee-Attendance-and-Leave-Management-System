services:
  - type: web
    name: employee-attendance-leave
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn employee_mgmt.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://employee-attendance-leave.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: employee-attendance-db
          property: connectionString

databases:
  - name: employee-attendance-db
    plan: free
